name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install libomp (macOS requirement for lightgbm)
        run: |
          brew install libomp || true

      - name: Install core dependencies
        run: |
          uv venv
          uv pip install numpy pandas scikit-learn pyarrow lightgbm yfinance mlforecast statsforecast optuna

      - name: Lint (ruff)
        run: |
          uv pip install ruff
          uv run ruff check src/ || true  # Skip if no src/ yet
          uv run ruff format --check src/ || true

      - name: Type check (pyright)
        run: |
          uv pip install pyright
          uv run pyright src/ || true  # Skip if no src/ yet

      - name: Run smoke tests
        run: |
          uv run python -c "
          import numpy
          import pandas
          import sklearn
          import lightgbm
          import pyarrow
          print('Core imports OK')
          print(f'numpy: {numpy.__version__}')
          print(f'pandas: {pandas.__version__}')
          print(f'scikit-learn: {sklearn.__version__}')
          print(f'lightgbm: {lightgbm.__version__}')
          "

  validate-env:
    name: Validate Environment Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check requirements.txt validity
        run: |
          python -c "
          with open('requirements.txt') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]
          print(f'{len(lines)} requirements found')
          assert len(lines) > 0, 'requirements.txt is empty'
          "

      - name: Validate environment.yml (if exists)
        run: |
          test -f environment.yml && echo "environment.yml present" || echo "No environment.yml (using conda export)"

      - name: Validate direnv setup
        run: |
          test -f .envrc && echo "direnv .envrc present" || echo "No .envrc found"
