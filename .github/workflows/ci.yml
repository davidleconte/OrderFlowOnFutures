name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          use-mamba: true
          activate-environment: orderflowonfutures
          environment-file: environment.yml

      - name: Install dependencies
        run: |
          pip install numpy pandas pyarrow yfinance scikit-learn lightgbm mlforecast statsforecast "u8darts[torch]" joblib torch optuna

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src/ || true  # Skip if no src/ yet
          ruff format --check src/ || true

      - name: Type check (pyright)
        run: |
          pip install pyright
          pyright src/ || true  # Skip if no src/ yet

      - name: Run smoke tests
        run: |
          python -c "
          import torch
          import mlforecast
          import statsforecast
          import darts
          import lightgbm
          import sklearn
          import pandas
          import numpy
          print('All public imports OK')
          print(f'torch: {torch.__version__}')
          "
          
          # Try vectorbtpro if available
          python -c "
          try:
              import vectorbtpro
              print(f'vectorbtpro: {vectorbtpro.__version__}')
          except ImportError:
              print('vectorbtpro not available (expected in CI without GH_TOKEN)')
          " || true
        env:
          KMP_DUPLICATE_LIB_OK: TRUE

  validate-env:
    name: Validate Environment Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check requirements.txt validity
        run: |
          python -c "
          with open('requirements.txt') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]
          print(f'{len(lines)} requirements found')
          assert len(lines) > 0, 'requirements.txt is empty'
          "

      - name: Validate environment.yml (if exists)
        run: |
          test -f environment.yml && echo "environment.yml present" || echo "No environment.yml (using conda export)"

      - name: Validate direnv setup
        run: |
          test -f .envrc && echo "direnv .envrc present" || echo "No .envrc found"
